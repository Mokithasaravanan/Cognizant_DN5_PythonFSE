<!DOCTYPE html>
<html>
<head>
<title>Responsive Layout</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f2f2;
}

/* Header */
header{
background:#2196F3;
color:white;
padding:20px;
text-align:center;
}

/* Navigation */
nav{
display:flex;
justify-content:center;
gap:20px;
background:#333;
padding:15px;
}

nav a{
color:white;
text-decoration:none;
}

/* Grid Layout */
.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

/* Flexbox Footer */
footer{
display:flex;
justify-content:center;
align-items:center;
background:#222;
color:white;
padding:20px;
}

/* Responsive */
@media(max-width:768px){
.container{
grid-template-columns:1fr;
}

nav{
flex-direction:column;
align-items:center;
}
}
</style>

</head>

<body>

<header>
<h1>Responsive Web Page</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<div class="card">
<h2>Card 1</h2>
<p>HTML CSS Flexbox Example</p>
</div>

<div class="card">
<h2>Card 2</h2>
<p>Grid Layout Example</p>
</div>

<div class="card">
<h2>Card 3</h2>
<p>Responsive Design</p>
</div>

</div>

<footer>
<p>© 2026 Responsive Website</p>
</footer>

</body>
</html>
